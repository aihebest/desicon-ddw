name: Docker Build & Trivy Scan

# Only runs once there is application code to build (src/**) or the Dockerfile
# changes — stays dormant until the DDW API is scaffolded.
on:
  pull_request:
    paths:
      - "src/**"
      - "Dockerfile"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"

permissions:
  contents: read
  packages: write       # push to GHCR on main
  security-events: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/ddw-api

jobs:
  build-scan:
    name: Build & scan image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, not pushed yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # Fail the build on HIGH/CRITICAL CVEs with an available fix, so a
      # vulnerable image is never pushed.
      - name: Trivy image scan
        run: trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --scanners vuln,secret,misconfig --no-progress ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Only publish an image that passed the scan, and only from main.
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
