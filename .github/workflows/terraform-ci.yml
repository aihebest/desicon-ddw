name: Terraform CI

# Plan + security-scan on every PR; apply only when merged to main.
on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  contents: read
  id-token: write       # required for Azure OIDC
  pull-requests: write  # post plan / scan summaries
  security-events: write

env:
  TF_VERSION: "1.9.8"
  WORKING_DIR: infra/envs/dev
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

concurrency:
  group: tf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # 1. Static analysis + IaC security scan (runs on PRs and pushes)
  # ----------------------------------------------------------------------
  validate-and-scan:
    name: Validate & Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        run: terraform fmt -recursive -check -diff
        working-directory: infra

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Checkov - scan Terraform
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          soft_fail: false          # fail the build on a policy violation
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          config_file: infra/.checkov.yaml

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ----------------------------------------------------------------------
  # 2. Plan (PRs) — read-only, OIDC, comments the plan on the PR
  # ----------------------------------------------------------------------
  plan:
    name: Terraform Plan
    needs: validate-and-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform plan
        run: terraform plan -no-color -input=false -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_login: ${{ vars.DDW_SQL_ADMIN_LOGIN }}
          TF_VAR_sql_admin_object_id: ${{ vars.DDW_SQL_ADMIN_OBJECT_ID }}

  # ----------------------------------------------------------------------
  # 3. Apply (main only) — gated by the 'dev' environment protection rules
  # ----------------------------------------------------------------------
  apply:
    name: Terraform Apply
    needs: validate-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev   # add required reviewers here in repo settings
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        run: terraform init -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_sql_admin_login: ${{ vars.DDW_SQL_ADMIN_LOGIN }}
          TF_VAR_sql_admin_object_id: ${{ vars.DDW_SQL_ADMIN_OBJECT_ID }}
