name: Dependency Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # GitHub's native dependency review — blocks PRs that add vulnerable deps.
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Dependency Review needs Dependency Graph + GitHub Advanced Security.
    # Non-blocking until GHAS is enabled; Trivy + dotnet cover dependency CVEs meanwhile.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true # needs GitHub Advanced Security on private repos
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # Trivy filesystem scan — catches vulnerable lockfile deps and leaked secrets.
  trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Trivy directly (avoids brittle internal action version pins).
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Trivy filesystem scan (vulns, secrets, misconfig)
        run: trivy fs --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln,secret,misconfig --no-progress .

  # .NET-specific transitive vulnerability check.
  dotnet-vulnerable:
    name: dotnet list --vulnerable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore & check for vulnerable packages
        run: |
          if ls **/*.sln **/*.csproj >/dev/null 2>&1; then
            dotnet restore
            echo "Checking transitive vulnerabilities..."
            dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
            if grep -q -E "Critical|High" vuln.txt; then
              echo "::error::High/Critical vulnerable NuGet packages found"; exit 1
            fi
          else
            echo "No .NET projects yet — skipping."
          fi
